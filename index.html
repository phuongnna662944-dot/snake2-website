<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Bỏ Túi Xịn Sò</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #111119);
        }

        .calculator {
            background: #232334;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 350px;
        }

        .screen {
            background: #1a1a26;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .history {
            color: #7b7b93;
            font-size: 16px;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 24px;
        }

        .output {
            color: #ffffff;
            font-size: 36px;
            font-weight: bold;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Định dạng màu sắc các loại nút */
        .number {
            background: #2d2d44;
            color: #ffffff;
        }

        .number:hover {
            background: #3d3d5c;
        }

        .operator {
            background: #ff9f0a;
            color: #ffffff;
        }

        .operator:hover {
            background: #cc7f08;
        }

        .function {
            background: #a5a5a5;
            color: #000000;
        }

        .function:hover {
            background: #e5e5e5;
        }

        .equals {
            background: #30d158;
            color: #ffffff;
        }

        .equals:hover {
            background: #24a844;
        }

        .double-space {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="screen">
            <div class="history" id="history-display"></div>
            <div class="output" id="output-display">0</div>
        </div>
        <div class="buttons">
            <!-- Hàng 1 -->
            <button class="function" onclick="clearScreen()">C</button>
            <button class="function" onclick="deleteLast()">⌫</button>
            <button class="function" onclick="inputOperator('%')">%</button>
            <button class="operator" onclick="inputOperator('/')">÷</button>
            
            <!-- Hàng 2 -->
            <button class="number" onclick="inputNumber('7')">7</button>
            <button class="number" onclick="inputNumber('8')">8</button>
            <button class="number" onclick="inputNumber('9')">9</button>
            <button class="operator" onclick="inputOperator('*')">×</button>
            
            <!-- Hàng 3 -->
            <button class="number" onclick="inputNumber('4')">4</button>
            <button class="number" onclick="inputNumber('5')">5</button>
            <button class="number" onclick="inputNumber('6')">6</button>
            <button class="operator" onclick="inputOperator('-')">−</button>
            
            <!-- Hàng 4 -->
            <button class="number" onclick="inputNumber('1')">1</button>
            <button class="number" onclick="inputNumber('2')">2</button>
            <button class="number" onclick="inputNumber('3')">3</button>
            <button class="operator" onclick="inputOperator('+')">+</button>
            
            <!-- Hàng 5 -->
            <button class="number double-space" onclick="inputNumber('0')">0</button>
            <button class="number" onclick="inputDecimal('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const historyDisplay = document.getElementById('history-display');
        const outputDisplay = document.getElementById('output-display');

        let currentInput = '0';
        let previousInput = '';
        let operator = '';
        let isCalculated = false;

        function updateDisplay() {
            outputDisplay.innerText = currentInput;
            if (operator) {
                historyDisplay.innerText = `${previousInput} ${getOperatorSymbol(operator)}`;
            } else {
                historyDisplay.innerText = '';
            }
        }

        function getOperatorSymbol(op) {
            if (op === '*') return '×';
            if (op === '/') return '÷';
            return op;
        }

        function inputNumber(num) {
            if (isCalculated) {
                currentInput = num;
                isCalculated = false;
            } else {
                if (currentInput === '0') {
                    currentInput = num;
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function inputDecimal(dot) {
            if (isCalculated) {
                currentInput = '0.';
                isCalculated = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes(dot)) {
                currentInput += dot;
            }
            updateDisplay();
        }

        function inputOperator(op) {
            if (operator && !isCalculated && currentInput !== '0') {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            currentInput = '0';
            isCalculated = false;
            updateDisplay();
        }

        function calculate() {
            if (!operator) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        result = 'Lỗi chia cho 0';
                    } else {
                        result = prev / current;
                    }
                    break;
                case '%':
                    result = prev % current;
                    break;
                default:
                    return;
            }

            // Giới hạn số chữ số thập phân để tránh lỗi dấu phẩy động (vd: 0.1 + 0.2)
            if (typeof result === 'number') {
                result = Math.round(result * 1e12) / 1e12;
            }

            historyDisplay.innerText = `${previousInput} ${getOperatorSymbol(operator)} ${currentInput} =`;
            currentInput = result.toString();
            operator = '';
            previousInput = '';
            isCalculated = true;
            outputDisplay.innerText = currentInput;
        }

        function clearScreen() {
            currentInput = '0';
            previousInput = '';
            operator = '';
            isCalculated = false;
            updateDisplay();
        }

        function deleteLast() {
            if (isCalculated) {
                clearScreen();
                return;
            }
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Tích hợp tương tác bằng bàn phím máy tính
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (key >= '0' && key <= '9') inputNumber(key);
            if (key === '.') inputDecimal('.');
            if (key === '+' || key === '-' || key === '*' || key === '/' || key === '%') inputOperator(key);
            if (key === 'Enter' || key === '=') {
                event.preventDefault(); // Tránh kích hoạt lại nút vừa click trước đó
                calculate();
            }
            if (key === 'Backspace') deleteLast();
            if (key === 'Escape') clearScreen();
        });
    </script>
</body>
</html>
